<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>Route Scout</title>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAxJntvMsqjKobyfTQzUA75vfk7IHCTaMQ&libraries=places,geometry"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:     #ef4444;
      --green:   #22c55e;
      --blue:    #3b82f6;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --border:  #e5e7eb;
      --bg:      #ffffff;
      --bg-subtle: #f9fafb;
      --text:    #111827;
      --muted:   #6b7280;
      --panel-w: 340px;
      --shadow:  0 8px 32px rgba(0,0,0,0.10);
    }

    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: var(--text); }

    /* ── MAP ─────────────────────────────────────── */
    #map {
      position: absolute;
      top: 0; left: var(--panel-w); right: 0; bottom: 0;
    }

    /* ── PANEL (desktop sidebar) ─────────────────── */
    #panel {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: var(--panel-w);
      background: var(--bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 10;
    }

    #panel-handle { display: none; }

    #panel-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 32px;
    }

    /* ── SECTIONS ────────────────────────────────── */
    .section { margin-bottom: 20px; }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* ── INPUTS ──────────────────────────────────── */
    .field-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .input {
      flex: 1;
      height: 40px;
      padding: 0 12px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      width: 100%;
      min-width: 0;
    }
    .input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.10);
    }
    .input::placeholder { color: #9ca3af; }

    .loc-btn {
      flex-shrink: 0;
      width: 40px; height: 40px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .loc-btn:hover { background: var(--bg-subtle); }

    /* ── STOP ROWS ───────────────────────────────── */
    .stop-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .stop-pip {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .stop-row.red   .stop-pip { background: var(--red); }
    .stop-row.green .stop-pip { background: var(--green); }
    .stop-row.blue  .stop-pip { background: var(--blue); }

    .stop-row.red   .input { border-left: 3px solid var(--red); }
    .stop-row.green .input { border-left: 3px solid var(--green); }
    .stop-row.blue  .input { border-left: 3px solid var(--blue); }

    /* ── DISTANCE ────────────────────────────────── */
    .distance-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .distance-input { flex: 1; }

    .unit-toggle {
      display: flex;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .unit-btn {
      padding: 0 14px;
      height: 40px;
      border: none;
      background: transparent;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--muted);
      transition: background 0.15s, color 0.15s;
    }
    .unit-btn.active { background: var(--primary); color: #fff; }

    /* ── BUTTONS ─────────────────────────────────── */
    .btn-row { display: flex; gap: 8px; margin-bottom: 8px; }

    .btn {
      height: 40px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }

    .btn-search { flex: 1; background: var(--primary); color: #fff; }
    .btn-search:hover { background: var(--primary-dark); }

    .btn-reset {
      padding: 0 18px;
      background: var(--bg-subtle);
      color: var(--text);
      border: 1.5px solid var(--border);
    }
    .btn-reset:hover { background: #f3f4f6; }

    .btn-maps {
      width: 100%;
      background: #1a73e8;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-maps:hover { background: #1557b0; }

    .disclaimer {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.6;
      margin-top: 10px;
    }

    /* ── MAPS FALLBACK BANNER ────────────────────── */
    #maps-banner {
      display: none;
      position: absolute;
      top: 12px;
      left: calc(var(--panel-w) + 12px);
      right: 12px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      box-shadow: var(--shadow);
      z-index: 20;
      align-items: center;
      gap: 12px;
      font-size: 13px;
    }
    #maps-banner .banner-text { flex: 1; min-width: 0; }
    #maps-banner strong { display: block; margin-bottom: 4px; }
    #maps-banner a {
      color: var(--primary);
      font-weight: 500;
      text-decoration: none;
      word-break: break-all;
    }
    #maps-banner a:hover { text-decoration: underline; }
    #maps-banner-close {
      flex-shrink: 0;
      width: 28px; height: 28px;
      border: none;
      background: var(--bg-subtle);
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      color: var(--muted);
      display: flex; align-items: center; justify-content: center;
    }

    /* ── RESULTS ─────────────────────────────────── */
    #results-section {
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    .result-group { margin-bottom: 16px; }

    .result-group-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .result-group-pip {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .result-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 10px;
      cursor: pointer;
      border: 1.5px solid transparent;
      margin-bottom: 4px;
      transition: background 0.12s, border-color 0.12s;
    }
    .result-item:hover { background: var(--bg-subtle); }
    .result-item.selected {
      background: rgba(37,99,235,0.05);
      border-color: rgba(37,99,235,0.18);
    }

    .result-pip {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .result-text { flex: 1; min-width: 0; }
    .result-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .result-addr {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .result-check {
      font-size: 15px;
      color: var(--primary);
      opacity: 0;
      flex-shrink: 0;
      transition: opacity 0.12s;
    }
    .result-item.selected .result-check { opacity: 1; }

    /* ── MOBILE ──────────────────────────────────── */
    @media (max-width: 768px) {
      #map { left: 0; }

      #panel {
        position: fixed;
        top: auto;
        left: 0; right: 0; bottom: 0;
        width: 100%;
        height: 82vh;
        border-right: none;
        border-top: 1.5px solid var(--border);
        border-radius: 20px 20px 0 0;
        box-shadow: 0 -6px 32px rgba(0,0,0,0.11);
        transform: translateY(calc(100% - 64px));
        transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
      }
      #panel.open { transform: translateY(0); }

      #panel-handle {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 64px;
        cursor: pointer;
        flex-shrink: 0;
        user-select: none;
        gap: 6px;
      }
      .handle-bar {
        width: 40px; height: 4px;
        border-radius: 2px;
        background: #d1d5db;
      }
      .handle-label {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
      }

      #maps-banner { left: 12px; }
    }
  </style>
</head>
<body onload="initMap()">

  <div id="map"></div>

  <!-- Fallback banner when window.open is blocked -->
  <div id="maps-banner">
    <div class="banner-text">
      <strong>Open in Google Maps</strong>
      <a id="maps-link" href="#" target="_blank" rel="noopener noreferrer">Tap here to open your route</a>
    </div>
    <button id="maps-banner-close" title="Dismiss">✕</button>
  </div>

  <!-- Panel -->
  <div id="panel">

    <!-- Mobile drag handle -->
    <div id="panel-handle">
      <div class="handle-bar"></div>
      <div class="handle-label">Route Scout</div>
    </div>

    <div id="panel-scroll">

      <!-- Route inputs -->
      <div class="section">
        <div class="section-label">Route</div>
        <div class="field-row">
          <input id="start" class="input" type="text" placeholder="Start location">
          <button id="use-current-location" class="loc-btn" title="Use my location">📍</button>
        </div>
        <div class="field-row">
          <input id="end" class="input" type="text" placeholder="Destination">
        </div>
      </div>

      <!-- Stop inputs -->
      <div class="section">
        <div class="section-label">Stops Along the Way</div>
        <div class="stop-row red">
          <span class="stop-pip"></span>
          <input id="locationType" class="input" type="text" placeholder="e.g., coffee, donuts, museum">
        </div>
        <div class="stop-row green">
          <span class="stop-pip"></span>
          <input id="locationType2" class="input" type="text" placeholder="e.g., park, restaurant">
        </div>
        <div class="stop-row blue">
          <span class="stop-pip"></span>
          <input id="locationType3" class="input" type="text" placeholder="e.g., gas station">
        </div>
      </div>

      <!-- Max detour distance -->
      <div class="section">
        <div class="section-label">Max Detour Distance</div>
        <div class="distance-row">
          <input id="maxDistance" class="input distance-input" type="number" min="0" step="0.1" placeholder="0">
          <div class="unit-toggle">
            <button class="unit-btn active" id="miles-btn">mi</button>
            <button class="unit-btn" id="km-btn">km</button>
          </div>
        </div>
      </div>

      <!-- Action buttons -->
      <div class="section">
        <div class="btn-row">
          <button class="btn btn-search" id="submit">Search</button>
          <button class="btn btn-reset" id="reset">Reset</button>
        </div>
        <button class="btn btn-maps" id="sendToGoogleMaps">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
          </svg>
          Open in Google Maps
        </button>
        <p class="disclaimer">* Google Maps returns up to 20 results at a time. For long routes, break into shorter segments.</p>
      </div>

      <!-- Results list (populated after search) -->
      <div id="results-section" style="display:none">
        <div class="section-label">
          Results <span id="results-count" style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px"></span>
        </div>
        <div id="results-list"></div>
      </div>

    </div><!-- /panel-scroll -->
  </div><!-- /panel -->

  <script>
    /* ── STATE ─────────────────────────────────────────── */
    let map, service, directionsService, directionsRenderer;
    let markers        = [];
    let selectedMarkers = [];
    let allResults     = []; // { place, color, marker, infowindow, listItem }
    let unit           = 'miles';

    const COLORS = {
      red:   '#ef4444',
      green: '#22c55e',
      blue:  '#3b82f6',
    };

    /* ── MARKER ICON ───────────────────────────────────── */
    function makeIcon(color, selected) {
      return {
        path: google.maps.SymbolPath.CIRCLE,
        fillColor: COLORS[color],
        fillOpacity: 1,
        strokeColor: selected ? '#fbbf24' : '#ffffff',
        strokeWeight: selected ? 3 : 2,
        scale: selected ? 11 : 8,
      };
    }

    /* ── INIT ──────────────────────────────────────────── */
    function initMap() {
      map = new google.maps.Map(document.getElementById('map'), {
        zoom: 10,
        mapTypeControl: false,
        fullscreenControl: false,
        streetViewControl: false,
      });

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          pos => map.setCenter({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
          () => {}
        );
      }

      directionsService  = new google.maps.DirectionsService();
      directionsRenderer = new google.maps.DirectionsRenderer({ suppressMarkers: false });
      directionsRenderer.setMap(map);

      new google.maps.places.Autocomplete(document.getElementById('start'));
      new google.maps.places.Autocomplete(document.getElementById('end'));

      /* event listeners */
      document.getElementById('submit')               .addEventListener('click', handleSearch);
      document.getElementById('reset')                .addEventListener('click', resetMap);
      document.getElementById('sendToGoogleMaps')     .addEventListener('click', sendToGoogleMaps);
      document.getElementById('use-current-location') .addEventListener('click', useCurrentLocation);
      document.getElementById('miles-btn')            .addEventListener('click', () => setUnit('miles'));
      document.getElementById('km-btn')               .addEventListener('click', () => setUnit('km'));
      document.getElementById('maps-banner-close')    .addEventListener('click', () => {
        document.getElementById('maps-banner').style.display = 'none';
      });
      document.getElementById('panel-handle').addEventListener('click', () => {
        document.getElementById('panel').classList.toggle('open');
      });
    }

    /* ── UNIT TOGGLE ───────────────────────────────────── */
    function setUnit(u) {
      unit = u;
      document.getElementById('miles-btn').classList.toggle('active', u === 'miles');
      document.getElementById('km-btn')   .classList.toggle('active', u === 'km');
    }

    /* ── SEARCH ────────────────────────────────────────── */
    function handleSearch() {
      const start    = document.getElementById('start').value.trim();
      const end      = document.getElementById('end').value.trim();
      const rawDist  = parseFloat(document.getElementById('maxDistance').value);

      if (!start || !end || isNaN(rawDist) || rawDist <= 0) {
        alert('Please enter a start location, destination, and a max detour distance greater than 0.');
        return;
      }

      const maxMiles = unit === 'km' ? rawDist / 1.60934 : rawDist;

      clearMarkers();
      hideResults();
      displayRoute(start, end);

      const t1 = document.getElementById('locationType') .value.trim();
      const t2 = document.getElementById('locationType2').value.trim();
      const t3 = document.getElementById('locationType3').value.trim();

      if (t1) searchAlongRoute(t1, start, end, maxMiles, 'red');
      if (t2) searchAlongRoute(t2, start, end, maxMiles, 'green');
      if (t3) searchAlongRoute(t3, start, end, maxMiles, 'blue');

      /* collapse bottom sheet on mobile */
      document.getElementById('panel').classList.remove('open');
    }

    /* ── ROUTE DISPLAY ─────────────────────────────────── */
    function displayRoute(origin, destination, waypoints) {
      const request = {
        origin, destination,
        travelMode: 'DRIVING',
      };
      if (waypoints && waypoints.length > 0) request.waypoints = waypoints;

      directionsService.route(request, (result, status) => {
        if (status === 'OK') directionsRenderer.setDirections(result);
        else console.error('Directions error:', status);
      });
    }

    function updateRoute() {
      const start = document.getElementById('start').value.trim();
      const end   = document.getElementById('end').value.trim();
      if (!start || !end) return;

      const waypoints = selectedMarkers.map(m => ({ location: m.getPosition(), stopover: true }));
      displayRoute(start, end, waypoints.length ? waypoints : null);
    }

    /* ── PLACES SEARCH ─────────────────────────────────── */
    function searchAlongRoute(type, origin, destination, maxMiles, color) {
      service = new google.maps.places.PlacesService(map);

      directionsService.route({ origin, destination, travelMode: 'DRIVING' }, (result, status) => {
        if (status !== 'OK') { console.error('Directions error:', status); return; }

        const bounds = result.routes[0].bounds;
        const path   = result.routes[0].overview_path;

        service.textSearch({ query: type, bounds }, (places, pStatus) => {
          if (pStatus !== 'OK') { console.error('Places error:', pStatus); return; }

          places.forEach(place => {
            if (!withinDistance(place, path, maxMiles)) return;

            const iw = new google.maps.InfoWindow({
              content: `<div style="font-size:13px;max-width:220px;line-height:1.4">
                          <strong>${place.name}</strong><br>
                          <span style="color:#6b7280;font-size:11px">${place.formatted_address || ''}</span>
                        </div>`,
            });

            const marker = new google.maps.Marker({
              map,
              position: place.geometry.location,
              icon: makeIcon(color, false),
              _selected: false,
              _color: color,
            });

            markers.push(marker);

            marker.addListener('click', () => toggleSelection(marker, iw));

            const listItem = buildListItem(place, color, marker, iw);
            allResults.push({ place, color, marker, infowindow: iw, listItem });
          });

          refreshResultsList();
          map.fitBounds(bounds);
        });
      });
    }

    function withinDistance(place, path, maxMiles) {
      const pt = new google.maps.LatLng(
        place.geometry.location.lat(),
        place.geometry.location.lng()
      );
      const maxM = maxMiles * 1609.34;
      return path.some(p => google.maps.geometry.spherical.computeDistanceBetween(pt, p) <= maxM);
    }

    /* ── MARKER / ITEM SELECTION ───────────────────────── */
    function toggleSelection(marker, iw) {
      marker._selected = !marker._selected;
      marker.setIcon(makeIcon(marker._color, marker._selected));

      if (marker._selected) {
        selectedMarkers.push(marker);
      } else {
        const i = selectedMarkers.indexOf(marker);
        if (i !== -1) selectedMarkers.splice(i, 1);
      }

      /* sync list item */
      const entry = allResults.find(r => r.marker === marker);
      if (entry && entry.listItem) {
        entry.listItem.classList.toggle('selected', marker._selected);
      }

      iw.open(map, marker);
      updateRoute();
    }

    /* ── RESULTS LIST ──────────────────────────────────── */
    function buildListItem(place, color, marker, iw) {
      const el = document.createElement('div');
      el.className = 'result-item';
      el.innerHTML = `
        <span class="result-pip" style="background:${COLORS[color]}"></span>
        <div class="result-text">
          <div class="result-name">${place.name}</div>
          <div class="result-addr">${place.formatted_address || ''}</div>
        </div>
        <span class="result-check">✓</span>
      `;
      el.addEventListener('click', () => {
        toggleSelection(marker, iw);
        map.panTo(marker.getPosition());
        if (window.innerWidth <= 768) {
          document.getElementById('panel').classList.remove('open');
        }
      });
      return el;
    }

    function refreshResultsList() {
      const section = document.getElementById('results-section');
      const list    = document.getElementById('results-list');
      list.innerHTML = '';

      if (allResults.length === 0) { section.style.display = 'none'; return; }

      section.style.display = 'block';
      document.getElementById('results-count').textContent = `(${allResults.length} found)`;

      const terms = {
        red:   document.getElementById('locationType') .value || 'Stop 1',
        green: document.getElementById('locationType2').value || 'Stop 2',
        blue:  document.getElementById('locationType3').value || 'Stop 3',
      };

      ['red', 'green', 'blue'].forEach(color => {
        const group = allResults.filter(r => r.color === color);
        if (group.length === 0) return;

        const groupEl = document.createElement('div');
        groupEl.className = 'result-group';
        groupEl.innerHTML = `
          <div class="result-group-label">
            <span class="result-group-pip" style="background:${COLORS[color]}"></span>
            ${terms[color]}
          </div>
        `;
        group.forEach(r => groupEl.appendChild(r.listItem));
        list.appendChild(groupEl);
      });
    }

    function hideResults() {
      document.getElementById('results-section').style.display = 'none';
      document.getElementById('results-list').innerHTML = '';
    }

    /* ── CLEAR / RESET ─────────────────────────────────── */
    function clearMarkers() {
      markers.forEach(m => m.setMap(null));
      markers         = [];
      selectedMarkers = [];
      allResults      = [];
    }

    function resetMap() {
      clearMarkers();
      hideResults();

      directionsRenderer.setMap(null);
      directionsRenderer = new google.maps.DirectionsRenderer({ suppressMarkers: false });
      directionsRenderer.setMap(map);

      map.setCenter({ lat: 32.7767, lng: -96.7970 });
      map.setZoom(10);

      ['start','end','locationType','locationType2','locationType3','maxDistance']
        .forEach(id => { document.getElementById(id).value = ''; });

      document.getElementById('maps-banner').style.display = 'none';
    }

    /* ── SEND TO GOOGLE MAPS ───────────────────────────── */
    function sendToGoogleMaps() {
      const start = document.getElementById('start').value.trim();
      const end   = document.getElementById('end').value.trim();

      if (!start || !end) {
        alert('Please enter a start location and destination first.');
        return;
      }

      const wps = selectedMarkers.map(m => m.getPosition().toUrlValue()).join('|');
      const url = `https://www.google.com/maps/dir/?api=1`
        + `&origin=${encodeURIComponent(start)}`
        + `&destination=${encodeURIComponent(end)}`
        + (wps ? `&waypoints=${encodeURIComponent(wps)}` : '');

      const win = window.open(url, '_blank');
      if (!win || win.closed || typeof win.closed === 'undefined') {
        document.getElementById('maps-link').href = url;
        document.getElementById('maps-banner').style.display = 'flex';
      }
    }

    /* ── USE CURRENT LOCATION ──────────────────────────── */
    function useCurrentLocation() {
      if (!navigator.geolocation) {
        alert("Your browser doesn't support geolocation.");
        return;
      }
      navigator.geolocation.getCurrentPosition(pos => {
        const latlng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        new google.maps.Geocoder().geocode({ location: latlng }, (results, status) => {
          if (status === 'OK' && results[0]) {
            document.getElementById('start').value = results[0].formatted_address;
          } else {
            alert('Could not determine your address. Try typing it instead.');
          }
        });
      }, () => alert('Could not get your location. Check browser permissions.'));
    }
  </script>
